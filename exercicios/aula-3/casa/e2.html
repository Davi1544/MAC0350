<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <h1 id="display">2</h1>
    <button onclick="dobrar()">Dobrar</button>

    <script>
        let tempo = 2
        let display = document.querySelector("#display")

        display.innerHTML = tempo

        function dobrar(){
            tempo *= 2;
            display.innerHTML = tempo

            if(tempo > 100){
                alert(`Cuidado, o número ${tempo} está ficando muito grande!`)      
            }
        }
    </script>
</body>
</html>

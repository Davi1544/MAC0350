<p>Username: {{ perfil.username }}</p>
<p>Handle: {{ perfil.handle }}</p>
<p>Email: {{ perfil.email }}</p>
<p>Bio: {{ perfil.bio }}</p>

{% if perfil.id == user.id %}
    <h3>Atualizar Informações do Perfil</h3>
    <form hx-put="/update_user" hx-target="#tweets" hx-select="#tweets" hx-swap="outerHTML">
        <input type="text" class="input-text" name="username" id="username-change" placeholder="Novo username...">
        <textarea name="bio" id="bio-change" rows="10" maxlength="280" placeholder="Nova bio"></textarea>
        <input type="submit" value="Atualizar User">
    </form>
{% endif %}
